<!DOCTYPE html>
<html>

<head>

<title>Admin Panel</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial;
    background:linear-gradient(to bottom,#001133,#00aa55);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.admin-box{
    width:500px;
    background:white;
    padding:25px;
    border-radius:10px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#001133;
    color:white;
    padding:12px;
}

td{
    padding:10px;
    text-align:center;
    border:1px solid #ccc;
}

</style>

</head>

<body>

<div class="admin-box">

    <h1>All Users</h1>

    <table>

        <thead>

            <tr>

                <th>Username</th>

                <th>Password</th>

            </tr>

        </thead>

        <tbody id="data">

        </tbody>

    </table>

</div>

<script>

async function loadUsers() {

    try{

        const response =
        await fetch("/users");

        const users =
        await response.json();

        let html = "";

        users.forEach(user => {

            html += `

            <tr>

                <td>${user.username}</td>

                <td>${user.password}</td>

            </tr>

            `;

        });

        document.getElementById("data").innerHTML = html;

    }

    catch(error){

        console.log(error);

    }

}

loadUsers();

</script>

</body>

</html>
